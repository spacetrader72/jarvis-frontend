<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>JARVIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #38bdf8;
    --red-dim: #0c4a6e;
    --amber: #f59e0b;
    --green: #4ade80;
    --bg: #030303;
    --surface: #0a0a0a;
    --border: #1a1a1a;
    --border2: #222;
    --text: #e0e0e0;
    --muted: #555;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Rajdhani', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); overflow: hidden; }

  /* Scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(56,189,248,0.012) 2px, rgba(56,189,248,0.012) 4px);
    pointer-events: none;
    z-index: 100;
  }

  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 680px;
    margin: 0 auto;
    font-family: var(--mono);
    position: relative;
  }

  /* ── HEADER ── */
  .header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .arc-reactor {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--red);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    animation: arc-pulse 3s ease-in-out infinite;
    cursor: pointer;
    flex-shrink: 0;
  }

  .arc-reactor::after {
    content: '';
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--red);
    opacity: 0.85;
    animation: arc-pulse 3s ease-in-out infinite 0.5s;
  }

  .arc-reactor.listening {
    border-color: var(--amber);
    animation: listening-pulse 0.8s ease-in-out infinite;
  }

  .arc-reactor.listening::after {
    background: var(--amber);
  }

  @keyframes arc-pulse {
    0%, 100% { box-shadow: 0 0 6px var(--red), 0 0 14px rgba(56,189,248,0.25); }
    50% { box-shadow: 0 0 14px var(--red), 0 0 28px rgba(56,189,248,0.4); }
  }

  @keyframes listening-pulse {
    0%, 100% { box-shadow: 0 0 8px var(--amber), 0 0 20px rgba(245,158,11,0.4); }
    50% { box-shadow: 0 0 20px var(--amber), 0 0 40px rgba(245,158,11,0.6); }
  }

  .logo-text { }
  .logo-title {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 5px;
    color: var(--text);
    line-height: 1;
  }
  .logo-sub {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 2px;
  }

  .status-area {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 2s ease-in-out infinite;
  }

  .status-dot.thinking { background: var(--amber); animation: blink 0.4s ease-in-out infinite; }
  .status-dot.listening { background: var(--amber); animation: blink 0.6s ease-in-out infinite; }
  .status-dot.offline { background: var(--muted); animation: none; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* ── MESSAGES ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 10px;
    animation: msg-in 0.18s ease-out;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 9px;
    letter-spacing: 1px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .avatar.jarvis { border: 1px solid var(--red); color: var(--red); background: transparent; }
  .avatar.user { border: 1px solid var(--border2); color: var(--muted); background: var(--border2); }

  .bubble {
    max-width: 84%;
    padding: 10px 13px;
    font-size: 13px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.jarvis .bubble {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-left: 2px solid var(--red);
    color: var(--text);
  }

  .msg.user .bubble {
    background: #0f0f0f;
    border: 1px solid var(--border2);
    color: #999;
    text-align: right;
  }

  /* Thinking dots */
  .thinking {
    display: flex;
    gap: 10px;
    align-items: center;
    animation: msg-in 0.18s ease-out;
  }

  .dots {
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-left: 2px solid var(--amber);
    display: flex;
    gap: 5px;
  }

  .dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--amber);
    animation: dot-bounce 1.2s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-bounce {
    0%,80%,100% { transform: translateY(0); opacity: 0.35; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* Listening indicator */
  .listening-bar {
    display: none;
    padding: 8px 16px;
    background: rgba(245,158,11,0.05);
    border-top: 1px solid rgba(245,158,11,0.2);
    font-size: 10px;
    color: var(--amber);
    letter-spacing: 2px;
    text-align: center;
    flex-shrink: 0;
  }
  .listening-bar.active { display: block; }

  /* ── QUICK ACTIONS ── */
  .quick-actions {
    padding: 8px 16px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .quick-btn {
    font-family: var(--mono);
    font-size: 9px;
    padding: 4px 9px;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .quick-btn:hover { border-color: var(--red); color: var(--red); }

  /* ── INPUT ── */
  .input-area {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .mic-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
    font-size: 14px;
  }

  .mic-btn:hover { border-color: var(--amber); color: var(--amber); }
  .mic-btn.active { border-color: var(--amber); color: var(--amber); background: rgba(245,158,11,0.1); }

  .input-field {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 9px 12px;
    resize: none;
    outline: none;
    min-height: 36px;
    max-height: 100px;
    line-height: 1.5;
    transition: border-color 0.15s;
  }

  .input-field:focus { border-color: var(--red); }
  .input-field::placeholder { color: var(--muted); }

  .send-btn {
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 9px 14px;
    background: var(--red);
    border: none;
    color: white;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.15s;
    height: 36px;
    flex-shrink: 0;
  }

  .send-btn:hover { background: #0ea5e9; }
  .send-btn:disabled { background: var(--border2); color: var(--muted); cursor: not-allowed; }

  /* ── BOOT SEQUENCE ── */
  .boot-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    gap: 24px;
  }

  .boot-arc {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid var(--red);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: arc-pulse 1.5s ease-in-out infinite;
  }

  .boot-arc::after {
    content: '';
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--red);
    opacity: 0.8;
    animation: arc-pulse 1.5s ease-in-out infinite 0.3s;
  }

  .boot-text {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 28px;
    letter-spacing: 10px;
    color: var(--red);
  }

  .boot-status {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .boot-bar {
    width: 200px;
    height: 2px;
    background: var(--border2);
    overflow: hidden;
  }

  .boot-progress {
    height: 100%;
    background: var(--red);
    width: 0%;
    transition: width 0.3s ease;
  }

  /* Mobile */
  @media (max-width: 480px) {
    .logo-title { font-size: 13px; letter-spacing: 4px; }
    .bubble { font-size: 12px; }
    .quick-actions { gap: 4px; }
    .quick-btn { font-size: 8px; padding: 3px 7px; }
  }
</style>
</head>
<body>

<!-- Boot sequence -->
<div class="boot-overlay" id="boot">
  <div class="boot-arc"></div>
  <div class="boot-text">J.A.R.V.I.S</div>
  <div class="boot-status" id="boot-status">INITIALISING SYSTEMS...</div>
  <div class="boot-bar"><div class="boot-progress" id="boot-progress"></div></div>
</div>

<div class="shell">
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="arc-reactor" id="arc-reactor" onclick="toggleVoice()" title="Click to speak"></div>
      <div class="logo-text">
        <div class="logo-title">J.A.R.V.I.S</div>
        <div class="logo-sub">CI PROJECT PORTFOLIO</div>
      </div>
    </div>
    <div class="status-area">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">ONLINE</span>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Listening bar -->
  <div class="listening-bar" id="listening-bar">⬤ LISTENING — SPEAK NOW</div>

  <!-- Quick actions -->
  <div class="quick-actions">
    <button class="quick-btn" onclick="quickSend('Portfolio status')">Portfolio</button>
    <button class="quick-btn" onclick="quickSend('What are my open actions this week?')">Open actions</button>
    <button class="quick-btn" onclick="quickSend('Any Trading Lab signals?')">Signals</button>
    <button class="quick-btn" onclick="quickSend('CI project status')">CI status</button>
    <button class="quick-btn" onclick="quickSend('What should I focus on today?')">Today</button>
    <button class="quick-btn" onclick="resetSession()">Reset</button>
  </div>

  <!-- Input -->
  <div class="input-area">
    <button class="mic-btn" id="mic-btn" onclick="toggleVoice()" title="Hold to speak">🎤</button>
    <textarea
      class="input-field"
      id="input"
      placeholder="Speak freely, sir..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
// Replace with your Render URL after deployment
const API_BASE = window.location.hostname === 'localhost'
  ? 'http://localhost:5000'
  : 'https://jarvis-ci.onrender.com'; // UPDATE THIS after deploying to Render

const SESSION_ID = 'session_' + Math.random().toString(36).slice(2);

// ── STATE ──────────────────────────────────────────────────────────────────
let isThinking = false;
let isListening = false;
let recognition = null;
let currentStreamDiv = null;

// ── BOOT SEQUENCE ──────────────────────────────────────────────────────────
const bootMessages = [
  'LOADING CLAUDE API...',
  'READING NOTION MEMORY...',
  'LOADING PROJECT CONTEXT...',
  'CALIBRATING PERSONALITY MATRIX...',
  'SYSTEMS NOMINAL...',
];

async function boot() {
  const statusEl = document.getElementById('boot-status');
  const progressEl = document.getElementById('boot-progress');

  for (let i = 0; i < bootMessages.length; i++) {
    statusEl.textContent = bootMessages[i];
    progressEl.style.width = ((i + 1) / bootMessages.length * 100) + '%';
    await sleep(400);
  }

  await sleep(300);
  document.getElementById('boot').style.opacity = '0';
  document.getElementById('boot').style.transition = 'opacity 0.5s';
  await sleep(500);
  document.getElementById('boot').style.display = 'none';

  // Boot message
  addMessage('jarvis', 'Good morning, sir. JARVIS online.\n\nCI Project Portfolio systems nominal. How can I be of service?');
}

// ── MESSAGING ──────────────────────────────────────────────────────────────
function addMessage(role, content) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="avatar ${role}">${role === 'jarvis' ? 'J' : 'A'}</div>
    <div class="bubble">${escapeHtml(content)}</div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function addThinking() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'thinking';
  div.id = 'thinking';
  div.innerHTML = `
    <div class="avatar jarvis">J</div>
    <div class="dots"><span></span><span></span><span></span></div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeThinking() {
  const t = document.getElementById('thinking');
  if (t) t.remove();
}

function setStatus(state) {
  const dot = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  dot.className = 'status-dot ' + state;
  text.textContent = {
    '': 'ONLINE',
    'thinking': 'PROCESSING',
    'listening': 'LISTENING',
    'offline': 'OFFLINE'
  }[state] || 'ONLINE';
}

async function sendMessage(overrideText) {
  const input = document.getElementById('input');
  const text = (overrideText || input.value).trim();
  if (!text || isThinking) return;

  input.value = '';
  autoResize(input);
  addMessage('user', text);
  addThinking();
  isThinking = true;
  setStatus('thinking');
  document.getElementById('send-btn').disabled = true;

  try {
    const res = await fetch(`${API_BASE}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: SESSION_ID, stream: false })
    });

    removeThinking();

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    addMessage('jarvis', data.response);

  } catch (err) {
    removeThinking();
    addMessage('jarvis', `Apologies, sir — connection issue. ${err.message}\n\nShall we try again?`);
  } finally {
    isThinking = false;
    setStatus('');
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

function quickSend(text) {
  document.getElementById('input').value = text;
  sendMessage();
}

async function resetSession() {
  await fetch(`${API_BASE}/reset`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session_id: SESSION_ID })
  });
  document.getElementById('messages').innerHTML = '';
  addMessage('jarvis', 'Session cleared, sir. Starting fresh.');
}

// ── VOICE INPUT ────────────────────────────────────────────────────────────
function initVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return null;

  const rec = new SpeechRecognition();
  rec.continuous = false;
  rec.interimResults = true;
  rec.lang = 'en-GB';

  rec.onstart = () => {
    isListening = true;
    setStatus('listening');
    document.getElementById('arc-reactor').classList.add('listening');
    document.getElementById('mic-btn').classList.add('active');
    document.getElementById('listening-bar').classList.add('active');
  };

  rec.onresult = (event) => {
    const transcript = Array.from(event.results)
      .map(r => r[0].transcript)
      .join('');
    document.getElementById('input').value = transcript;
    autoResize(document.getElementById('input'));
  };

  rec.onend = () => {
    isListening = false;
    setStatus('');
    document.getElementById('arc-reactor').classList.remove('listening');
    document.getElementById('mic-btn').classList.remove('active');
    document.getElementById('listening-bar').classList.remove('active');

    const text = document.getElementById('input').value.trim();
    if (text) sendMessage();
  };

  rec.onerror = (event) => {
    isListening = false;
    setStatus('');
    document.getElementById('arc-reactor').classList.remove('listening');
    document.getElementById('mic-btn').classList.remove('active');
    document.getElementById('listening-bar').classList.remove('active');
  };

  return rec;
}

function toggleVoice() {
  if (!recognition) {
    recognition = initVoice();
    if (!recognition) {
      addMessage('jarvis', "Voice input isn't supported in this browser, sir. Chrome works best. Text input remains fully operational.");
      return;
    }
  }

  if (isListening) {
    recognition.stop();
  } else {
    recognition.start();
  }
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── INIT ───────────────────────────────────────────────────────────────────
boot();
</script>
</body>
</html>
